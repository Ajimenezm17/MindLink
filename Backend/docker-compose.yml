services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tfguser
      POSTGRES_PASSWORD: tfgpwd123
      POSTGRES_DB: tfgdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data: